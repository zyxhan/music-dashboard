<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header reveal">
        <div class="header-content">
            <p class="header-label">PERSONAL MUSIC ANALYTICS</p>
            <h1>我的音乐档案</h1>
            <p class="header-desc">2025年度听歌数据可视化报告</p>
        </div>
    </header>

    <main class="dashboard">
        <!-- KPI 核心指标 -->
        <section class="kpi-section reveal">
            <div class="kpi-card" data-delay="0">
                <span class="kpi-number" data-target="2846">0</span>
                <span class="kpi-unit">首</span>
                <p class="kpi-name">累计播放</p>
            </div>
            <div class="kpi-card" data-delay="100">
                <span class="kpi-number" data-target="856">0</span>
                <span class="kpi-unit">小时</span>
                <p class="kpi-name">聆听时长</p>
            </div>
            <div class="kpi-card" data-delay="200">
                <span class="kpi-number" data-target="328">0</span>
                <span class="kpi-unit">次</span>
                <p class="kpi-name">周杰伦播放</p>
            </div>
            <div class="kpi-card" data-delay="300">
                <span class="kpi-number" data-target="97">0</span>
                <span class="kpi-unit">%</span>
                <p class="kpi-name">深夜听歌占比</p>
            </div>
        </section>

        <!-- 专辑封面墙 -->
        <section class="section reveal">
            <h2 class="section-title">常听歌手</h2>
            <p class="section-subtitle">鼠标悬停查看详情</p>
            <div class="album-wall" id="album-wall"></div>
        </section>

        <!-- 图表区域 -->
        <section class="section reveal">
            <h2 class="section-title">数据洞察</h2>
            <div class="chart-grid">
                <div class="chart-card">
                    <h3>时段分布</h3>
                    <div id="chart-hours" class="chart-container"></div>
                </div>
                <div class="chart-card">
                    <h3>歌手排行</h3>
                    <div id="chart-artists" class="chart-container"></div>
                </div>
                <div class="chart-card">
                    <h3>风格偏好</h3>
                    <div id="chart-genres" class="chart-container"></div>
                </div>
                <div class="chart-card">
                    <h3>月度趋势</h3>
                    <div id="chart-monthly" class="chart-container"></div>
                </div>
                <div class="chart-card">
                    <h3>偏好画像</h3>
                    <div id="chart-radar" class="chart-container"></div>
                </div>
                <div class="chart-card">
                    <h3>活跃热力</h3>
                    <div id="chart-heatmap" class="chart-container"></div>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>Music Dashboard &copy; 2025</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
